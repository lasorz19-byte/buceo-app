<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bitacora de Buceo</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f9ff; color: #1e293b; }
    select, input, textarea, button { font-family: inherit; }
    input:focus, select:focus, textarea:focus { border-color: #0ea5e9 !important; box-shadow: 0 0 0 3px rgba(14,165,233,0.1); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SUPABASE_URL = 'https://dqirekqfbzuekeoajxyn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxaXJla3FmYnp1ZWtlb2FqeHluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4OTM0ODEsImV4cCI6MjA5NDQ2OTQ4MX0.8vc4oZa_B9_A_Kfh2KF_mLcPLv02cC-2veBjSgPmqnQ';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const GEAR    = ["BCD","REG","MASK","FINS","WS","WB"];
const CERTS   = ["Sin certificacion","OW","AOW","Rescue","Divemaster","Instructor","TEC","Otro"];
const CERT_AG = ["PADI","SSI","NAUI","CMAS","SDI/TDI","RAID","SNSI","Otra"];
const ROLES   = ["Capitan","Instructor","Dive Master"];

const STATUS = {
  programada:{ bg:"#e0f2fe", text:"#0369a1", dot:"#0ea5e9", label:"Programada" },
  completada: { bg:"#dcfce7", text:"#15803d", dot:"#22c55e", label:"Completada" },
  cancelada:  { bg:"#fee2e2", text:"#b91c1c", dot:"#ef4444", label:"Cancelada"  },
};
const DAYS   = ["Dom","Lun","Mar","Mie","Jue","Vie","Sab"];
const MONTHS = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const GC = [
  { border:"#0ea5e9", bg:"#f0f9ff", badge:"#0369a1", badgeBg:"#e0f2fe" },
  { border:"#10b981", bg:"#f0fdf4", badge:"#065f46", badgeBg:"#d1fae5" },
  { border:"#f59e0b", bg:"#fffbeb", badge:"#92400e", badgeBg:"#fef3c7" },
  { border:"#8b5cf6", bg:"#faf5ff", badge:"#5b21b6", badgeBg:"#ede9fe" },
  { border:"#ef4444", bg:"#fff1f2", badge:"#991b1b", badgeBg:"#fee2e2" },
];
const GC_EXT = { border:"#64748b", bg:"#f8fafc", badge:"#334155", badgeBg:"#e2e8f0" };

const newGrupo    = () => ({ id:Date.now()+Math.random(), instructorId:"", instructorNombre:"", clientes:[] });
const newGrupoExt = () => ({ id:Date.now()+Math.random(), nombreGrupo:"", dmExterno:"", pax:1, equipo:[] });
const newSalida   = () => ({ fecha:"", hora:"", embarcacion_id:"", capitan_id:"", grupos:[], gruposExternos:[], notas:"" });
const newCliente  = () => ({ nombre:"", apellido:"", telefono:"", email:"", agencia:"PADI", certificacion:"OW", numero_buzo:"", nacimiento:"", notas:"" });
const newStaff    = () => ({ nombre:"", apellido:"", roles:[], telefono:"", email:"", notas:"" });
const newEmb      = () => ({ nombre:"", matricula:"", capacidad:"", notas:"" });

const fn   = c => (c.nombre + " " + (c.apellido||"")).trim();
const cNum = n => "C-" + String(n).padStart(4,"0");
const sNum = n => "S-" + String(n).padStart(4,"0");

function App() {
  const [salidas,  setSalidas]  = useState([]);
  const [clientes, setClientes] = useState([]);
  const [staff,    setStaff]    = useState([]);
  const [embs,     setEmbs]     = useState([]);
  const [loading,  setLoading]  = useState(true);

  const [sf,   setSf]   = useState(newSalida());
  const [ss,   setSs]   = useState("programada");
  const [sid,  setSid]  = useState(null);
  const [sExp, setSExp] = useState({});
  const [sFil, setSFil] = useState("todas");
  const [sQ,   setSQ]   = useState("");

  const [cf,   setCf]   = useState(newCliente());
  const [cid,  setCid]  = useState(null);
  const [cQ,   setCQ]   = useState("");
  const [cDet, setCDet] = useState(null);
  const [dup,  setDup]  = useState(null);

  const [stf,   setStf]   = useState(newStaff());
  const [stfId, setStfId] = useState(null);
  const [embF,  setEmbF]  = useState(newEmb());
  const [embId, setEmbId] = useState(null);

  const [calY, setCalY] = useState(new Date().getFullYear());
  const [calM, setCalM] = useState(new Date().getMonth());
  const [calD, setCalD] = useState(null);
  const [sec,  setSec]  = useState("salidas");
  const [tab,  setTab]  = useState("staff");
  const [view, setView] = useState("lista");
  const [toast,setToast]= useState(null);

  useEffect(()=>{ load(); },[]);

  const load = async () => {
    setLoading(true);
    const [s,c,st,e] = await Promise.all([
      db.from("salidas").select("*").order("created_at",{ascending:false}),
      db.from("clientes").select("*").order("apellido"),
      db.from("staff").select("*").order("nombre"),
      db.from("embarcaciones").select("*").order("nombre"),
    ]);
    if(s.data)  setSalidas(s.data);
    if(c.data)  setClientes(c.data);
    if(st.data) setStaff(st.data);
    if(e.data)  setEmbs(e.data);
    setLoading(false);
  };

  const nextNum = async (tipo) => {
    const {data} = await db.from("counters").select("valor").eq("id",tipo).single();
    const v = data?.valor||1;
    await db.from("counters").update({valor:v+1}).eq("id",tipo);
    return v;
  };

  const toast_ = (msg,type="success") => { setToast({msg,type}); setTimeout(()=>setToast(null),2800); };
  const go     = (s,v) => { setSec(s); setView(v); setCalD(null); };

  const embN  = id => embs.find(x=>x.id===id)?.nombre||"--";
  const staffN= id => { const s=staff.find(x=>x.id===id); return s?fn(s):"--"; };
  const tPax  = s  => {
    const prop = (s.grupos||[]).reduce((a,g)=>a+(g.clientes?.length||0),0);
    const ext  = (s.gruposExternos||[]).reduce((a,g)=>a+(Number(g.pax)||0),0);
    return prop+ext;
  };
  const hist = cid => salidas.filter(s=>(s.grupos||[]).some(g=>(g.clientes||[]).some(c=>c.clienteId===cid)));

  // Grupos propios
  const addGrupo = () => setSf(s=>({...s,grupos:[...s.grupos,newGrupo()]}));
  const remGrupo = gi => setSf(s=>({...s,grupos:s.grupos.filter((_,i)=>i!==gi)}));
  const updGrupo = (gi,f,v) => setSf(s=>({...s,grupos:s.grupos.map((g,i)=>i===gi?{...g,[f]:v}:g)}));
  const addCli   = (gi,cl) => setSf(s=>({...s,grupos:s.grupos.map((g,i)=>i!==gi?g:{...g,clientes:[...(g.clientes||[]),{clienteId:cl.id,nombre:fn(cl),gear:{}}]})}));
  const remCli   = (gi,ci) => setSf(s=>({...s,grupos:s.grupos.map((g,i)=>i!==gi?g:{...g,clientes:g.clientes.filter((_,j)=>j!==ci)})}));
  const togGear  = (gi,ci,gear) => setSf(s=>({...s,grupos:s.grupos.map((g,i)=>i!==gi?g:{...g,clientes:g.clientes.map((c,j)=>j!==ci?c:{...c,gear:{...(c.gear||{}),[gear]:!(c.gear?.[gear])}})})}));
  const avail    = gi => { const used=new Set((sf.grupos[gi]?.clientes||[]).map(c=>c.clienteId)); return clientes.filter(c=>!used.has(c.id)); };

  // Grupos externos
  const addGrupoExt = () => setSf(s=>({...s,gruposExternos:[...(s.gruposExternos||[]),newGrupoExt()]}));
  const remGrupoExt = gi => setSf(s=>({...s,gruposExternos:(s.gruposExternos||[]).filter((_,i)=>i!==gi)}));
  const updGrupoExt = (gi,f,v) => setSf(s=>({...s,gruposExternos:(s.gruposExternos||[]).map((g,i)=>i===gi?{...g,[f]:v}:g)}));
  const togGearExt  = (gi,gear) => setSf(s=>({...s,gruposExternos:(s.gruposExternos||[]).map((g,i)=>i!==gi?g:{...g,equipo:(g.equipo||[]).includes(gear)?(g.equipo||[]).filter(x=>x!==gear):[...(g.equipo||[]),gear]})}));

  // Salidas CRUD
  const saveSalida = async () => {
    if(!sf.fecha||!sf.hora){toast_("Completa fecha y hora.","error");return;}
    const p = { fecha:sf.fecha, hora:sf.hora, embarcacion_id:sf.embarcacion_id||null, capitan_id:sf.capitan_id||null, grupos:sf.grupos, gruposExternos:sf.gruposExternos||[], notas:sf.notas||null, status:ss };
    if(sid){
      const {error}=await db.from("salidas").update(p).eq("id",sid);
      if(error){toast_("Error al actualizar.","error");return;}
      setSalidas(x=>x.map(s=>s.id===sid?{...s,...p}:s));
      toast_("Salida actualizada.");
    } else {
      const n=await nextNum("salidas");
      const {data,error}=await db.from("salidas").insert({...p,num_salida:n}).select().single();
      if(error){toast_("Error al registrar.","error");return;}
      setSalidas(x=>[data,...x]);
      toast_("Salida registrada.");
    }
    setSf(newSalida()); setSs("programada"); setSid(null); setView("lista");
  };
  const editSalida = s => { setSf({fecha:s.fecha,hora:s.hora,embarcacion_id:s.embarcacion_id||"",capitan_id:s.capitan_id||"",grupos:s.grupos||[],gruposExternos:s.gruposExternos||[],notas:s.notas||""}); setSs(s.status); setSid(s.id); setView("nueva"); };
  const delSalida  = async id => { await db.from("salidas").delete().eq("id",id); setSalidas(x=>x.filter(s=>s.id!==id)); toast_("Salida eliminada.","error"); };
  const chgStatus  = async (id,ns) => { await db.from("salidas").update({status:ns}).eq("id",id); setSalidas(x=>x.map(s=>s.id===id?{...s,status:ns}:s)); };

  // Clientes CRUD
  const checkDup = (form,editId) => {
    const n=form.nombre.trim().toLowerCase(), a=form.apellido.trim().toLowerCase();
    return clientes.filter(c=>{ if(c.id===editId)return false; return (c.nombre.toLowerCase()===n&&c.apellido.toLowerCase()===a)||(form.email&&c.email?.toLowerCase()===form.email.toLowerCase())||(form.telefono&&c.telefono===form.telefono)||(form.numero_buzo&&c.numero_buzo===form.numero_buzo); });
  };
  const saveCli = async (force=false) => {
    if(!cf.nombre.trim()||!cf.apellido.trim()){toast_("Nombre y apellido obligatorios.","error");return;}
    if(!force){const d=checkDup(cf,cid);if(d.length>0){setDup(d);return;}}
    setDup(null);
    if(cid){
      const {error}=await db.from("clientes").update(cf).eq("id",cid);
      if(error){toast_("Error.","error");return;}
      setClientes(x=>x.map(c=>c.id===cid?{...c,...cf}:c));
      toast_("Cliente actualizado.");
    } else {
      const n=await nextNum("clientes");
      const {data,error}=await db.from("clientes").insert({...cf,num_cliente:n}).select().single();
      if(error){toast_("Error.","error");return;}
      setClientes(x=>[data,...x]);
      toast_("Cliente registrado - " + cNum(n));
    }
    setCf(newCliente()); setCid(null); setView("lista");
  };
  const editCli = c => { setCf({nombre:c.nombre,apellido:c.apellido||"",telefono:c.telefono||"",email:c.email||"",agencia:c.agencia||"PADI",certificacion:c.certificacion||"OW",numero_buzo:c.numero_buzo||"",nacimiento:c.nacimiento||"",notas:c.notas||""}); setCid(c.id); setDup(null); setView("clienteForm"); };
  const delCli  = async id => { await db.from("clientes").delete().eq("id",id); setClientes(x=>x.filter(c=>c.id!==id)); setCDet(null); setView("lista"); toast_("Cliente eliminado.","error"); };

  // Staff CRUD
  const saveStaff = async () => {
    if(!stf.nombre.trim()){toast_("El nombre es obligatorio.","error");return;}
    if((stf.roles||[]).length===0){toast_("Asigna al menos un rol.","error");return;}
    if(stfId){
      const {error}=await db.from("staff").update(stf).eq("id",stfId);
      if(error){toast_("Error.","error");return;}
      setStaff(x=>x.map(s=>s.id===stfId?{...s,...stf}:s));
      toast_("Staff actualizado.");
    } else {
      const {data,error}=await db.from("staff").insert(stf).select().single();
      if(error){toast_("Error.","error");return;}
      setStaff(x=>[data,...x]);
      toast_("Staff registrado.");
    }
    setStf(newStaff()); setStfId(null); setView("catalogo");
  };
  const editStaff = s => { setStf({nombre:s.nombre,apellido:s.apellido||"",roles:s.roles||[],telefono:s.telefono||"",email:s.email||"",notas:s.notas||""}); setStfId(s.id); setView("staffForm"); };
  const delStaff  = async id => { await db.from("staff").delete().eq("id",id); setStaff(x=>x.filter(s=>s.id!==id)); toast_("Staff eliminado.","error"); };
  const togRol    = rol => setStf(s=>({...s,roles:(s.roles||[]).includes(rol)?(s.roles||[]).filter(r=>r!==rol):[...(s.roles||[]),rol]}));

  // Embarcaciones CRUD
  const saveEmb = async () => {
    if(!embF.nombre.trim()){toast_("Nombre obligatorio.","error");return;}
    if(embId){
      const {error}=await db.from("embarcaciones").update(embF).eq("id",embId);
      if(error){toast_("Error.","error");return;}
      setEmbs(x=>x.map(e=>e.id===embId?{...e,...embF}:e));
      toast_("Embarcacion actualizada.");
    } else {
      const {data,error}=await db.from("embarcaciones").insert(embF).select().single();
      if(error){toast_("Error.","error");return;}
      setEmbs(x=>[data,...x]);
      toast_("Embarcacion registrada.");
    }
    setEmbF(newEmb()); setEmbId(null); setView("catalogo");
  };
  const delEmb = async id => { await db.from("embarcaciones").delete().eq("id",id); setEmbs(x=>x.filter(e=>e.id!==id)); toast_("Embarcacion eliminada.","error"); };

  // Excel
  const exportXLS = () => {
    if(!salidas.length){toast_("No hay salidas.","error");return;}
    const rows=[];
    salidas.forEach(s=>{
      (s.grupos||[]).forEach(g=>{
        (g.clientes||[]).forEach(c=>{
          const cl=clientes.find(x=>x.id===c.clienteId)||{};
          rows.push({"#Salida":sNum(s.num_salida||0),"Tipo":"Propio","Fecha":s.fecha,"Hora":s.hora,"Embarcacion":embN(s.embarcacion_id),"Capitan":staffN(s.capitan_id),"Instructor/DM":g.instructorNombre||"","Grupo/Agencia":"","#Cliente":cl.num_cliente?cNum(cl.num_cliente):"","Nombre":cl.nombre||"","Apellido":cl.apellido||"","Pax":1,...Object.fromEntries(GEAR.map(g=>[g,c.gear?.[g]?"si":""])),"Estado":STATUS[s.status]?.label||s.status});
        });
      });
      (s.gruposExternos||[]).forEach(g=>{
        rows.push({"#Salida":sNum(s.num_salida||0),"Tipo":"Externo","Fecha":s.fecha,"Hora":s.hora,"Embarcacion":embN(s.embarcacion_id),"Capitan":staffN(s.capitan_id),"Instructor/DM":g.dmExterno||"","Grupo/Agencia":g.nombreGrupo||"","#Cliente":"","Nombre":"","Apellido":"","Pax":g.pax,...Object.fromEntries(GEAR.map(ge=>[ge,(g.equipo||[]).includes(ge)?"si":""])),"Estado":STATUS[s.status]?.label||s.status});
      });
    });
    const ws=XLSX.utils.json_to_sheet(rows);
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Salidas");
    XLSX.writeFile(wb,"buceo_"+new Date().toISOString().slice(0,10)+".xlsx");
    toast_("Excel descargado");
  };

  // Calendar
  const byDate={};
  salidas.forEach(s=>{ if(!byDate[s.fecha])byDate[s.fecha]=[]; byDate[s.fecha].push(s); });
  const p2   = n => String(n).padStart(2,"0");
  const dKey = d => calY+"-"+p2(calM+1)+"-"+p2(d);
  const fd   = new Date(calY,calM,1).getDay();
  const td   = new Date(calY,calM+1,0).getDate();
  const dEvs = calD?(byDate[dKey(calD)]||[]):[];

  const fSal = salidas.filter(s=>{
    const ok=sFil==="todas"||s.status===sFil;
    const q=sQ.toLowerCase();
    const t=[embN(s.embarcacion_id),staffN(s.capitan_id),s.fecha,...(s.grupos||[]).flatMap(g=>[g.instructorNombre||"",...(g.clientes||[]).map(c=>c.nombre)]),...(s.gruposExternos||[]).flatMap(g=>[g.nombreGrupo||"",g.dmExterno||""])].join(" ").toLowerCase();
    return ok&&(!q||t.includes(q));
  });
  const fCli = clientes.filter(c=>{ const q=cQ.toLowerCase(); return !q||[c.nombre,c.apellido,c.email,c.num_cliente?cNum(c.num_cliente):""].join(" ").toLowerCase().includes(q); });
  const cnts = { programada:salidas.filter(s=>s.status==="programada").length, completada:salidas.filter(s=>s.status==="completada").length, cancelada:salidas.filter(s=>s.status==="cancelada").length };

  if(loading) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:16,background:"#f0f9ff"}}>
      <div style={{fontSize:52}}>🤿</div>
      <div style={{fontSize:16,fontWeight:600,color:"#0c4a6e"}}>Cargando Bitacora de Buceo...</div>
    </div>
  );

  return (
    <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif",minHeight:"100vh",background:"#f0f9ff",color:"#1e293b"}}>

      <header style={{background:"#0c4a6e",padding:"0 20px",boxShadow:"0 2px 8px rgba(0,0,0,0.2)"}}>
        <div style={{maxWidth:1200,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 0",flexWrap:"wrap",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <span style={{fontSize:32}}>🤿</span>
            <div>
              <div style={{fontSize:19,fontWeight:700,color:"#fff"}}>Bitacora de Buceo</div>
              <div style={{fontSize:11,color:"#7dd3fc"}}>Gestion de salidas - Clientes - Staff</div>
            </div>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            <div style={{display:"flex",gap:4}}>
              {[["lista","Salidas"],["calendario","Calendario"]].map(([v,l])=>(
                <button key={v} onClick={()=>go("salidas",v)} style={{...Btn,background:sec==="salidas"&&view===v?"#0ea5e9":"rgba(255,255,255,0.12)",color:"#fff"}}>{l}</button>
              ))}
            </div>
            <button onClick={()=>go("clientes","lista")} style={{...Btn,background:sec==="clientes"?"#0ea5e9":"rgba(255,255,255,0.12)",color:"#fff"}}>Clientes</button>
            <button onClick={()=>go("catalogo","catalogo")} style={{...Btn,background:sec==="catalogo"?"#0ea5e9":"rgba(255,255,255,0.12)",color:"#fff"}}>Catalogo</button>
            <div style={{width:1,height:28,background:"rgba(255,255,255,0.2)"}}/>
            {sec==="salidas"&&<>
              <button onClick={exportXLS} style={{...Btn,background:"#065f46",color:"#fff"}}>Excel</button>
              <button onClick={()=>{setSf(newSalida());setSs("programada");setSid(null);go("salidas","nueva");}} style={{...Btn,background:"#0369a1",color:"#fff",fontWeight:700}}>+ Nueva Salida</button>
            </>}
            {sec==="clientes"&&<button onClick={()=>{setCf(newCliente());setCid(null);setDup(null);go("clientes","clienteForm");}} style={{...Btn,background:"#0369a1",color:"#fff",fontWeight:700}}>+ Nuevo Cliente</button>}
          </div>
        </div>
      </header>

      <main style={{maxWidth:1200,margin:"0 auto",padding:"24px 16px"}}>

        {/* Stats */}
        {sec==="salidas"&&view!=="nueva"&&(
          <div style={{display:"flex",gap:12,marginBottom:24,flexWrap:"wrap"}}>
            {Object.entries(STATUS).map(([k,v])=>(
              <div key={k} style={{...Card,padding:"14px 18px",minWidth:100,display:"flex",flexDirection:"column",alignItems:"center",background:v.bg}}>
                <div style={{fontSize:26,fontWeight:800,color:v.text}}>{cnts[k]}</div>
                <div style={{fontSize:11,fontWeight:600,marginTop:4,textTransform:"uppercase",color:v.text}}>{v.label}</div>
              </div>
            ))}
            <div style={{...Card,padding:"14px 18px",minWidth:100,display:"flex",flexDirection:"column",alignItems:"center",background:"#f1f5f9"}}>
              <div style={{fontSize:26,fontWeight:800,color:"#475569"}}>{salidas.length}</div>
              <div style={{fontSize:11,fontWeight:600,marginTop:4,textTransform:"uppercase",color:"#475569"}}>Total</div>
            </div>
            <div style={{...Card,padding:"14px 18px",minWidth:100,display:"flex",flexDirection:"column",alignItems:"center",background:"#faf5ff"}}>
              <div style={{fontSize:26,fontWeight:800,color:"#5b21b6"}}>{clientes.length}</div>

function CliSel({disp,onSel,gc}){
  const [open,setOpen]=useState(false);
  const [q,setQ]=useState("");
  const ref=useRef();
  useEffect(()=>{ const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);}; document.addEventListener("mousedown",h); return()=>document.removeEventListener("mousedown",h); },[]);
  const lista=disp.filter(c=>!q||(c.nombre+" "+c.apellido).toLowerCase().includes(q.toLowerCase())||("C-"+String(c.num_cliente).padStart(4,"0")).includes(q));
  return (
    <div ref={ref} style={{position:"relative"}}>
      <button onClick={()=>setOpen(o=>!o)} style={{border:"none",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer",background:gc.badgeBg,color:gc.badge}}>+ Agregar cliente</button>
      {open&&(
        <div style={{position:"absolute",right:0,top:"calc(100% + 6px)",background:"#fff",borderRadius:10,boxShadow:"0 4px 20px rgba(0,0,0,0.15)",padding:10,minWidth:260,zIndex:100,border:"1px solid #e2e8f0"}}>
          <input autoFocus style={{...IS,marginBottom:8,fontSize:13}} placeholder="Buscar nombre o #cliente..." value={q} onChange={e=>setQ(e.target.value)}/>
          {lista.length===0?<div style={{fontSize:13,color:"#94a3b8",padding:"6px 0"}}>{disp.length===0?"Todos asignados.":"Sin resultados."}</div>
          :lista.map(c=>(
            <div key={c.id} style={{padding:"8px 10px",borderRadius:8,cursor:"pointer",marginBottom:2}} onClick={()=>{onSel(c);setOpen(false);setQ("");}}>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <span style={{fontWeight:600,fontSize:14}}>{c.nombre} {c.apellido}</span>
                <span style={{fontSize:11,color:"#0369a1",fontWeight:700}}>C-{String(c.num_cliente).padStart(4,"0")}</span>
              </div>
              <div style={{fontSize:11,color:"#94a3b8"}}>{c.agencia} - {c.certificacion}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function SLbl({children}){ return <div style={{fontSize:11,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"1px",marginBottom:10}}>{children}</div>; }
function FF({label,type="text",value,onChange,placeholder}){ return <div><label style={LS}>{label}</label><input type={type} style={IS} value={value||""} placeholder={placeholder||""} onChange={e=>onChange(e.target.value)}/></div>; }

const Card  = {background:"#fff",borderRadius:14,padding:24,boxShadow:"0 2px 12px rgba(0,0,0,0.08)",marginBottom:20};
const Btn   = {border:"none",borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:600,cursor:"pointer"};
const IS    = {width:"100%",padding:"9px 12px",borderRadius:8,border:"1.5px solid #cbd5e1",fontSize:14,outline:"none",boxSizing:"border-box",background:"#fff"};
